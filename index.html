<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twins Are Birds</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400;600&family=Amatic+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: #000;
  overflow: hidden;
}

body {
  color: #e8e0d4;
  font-family: 'Josefin Sans', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding-bottom: env(safe-area-inset-bottom);
}
  /* ── Title ── */
  .masthead-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    padding: 40px 0 20px;
  }

  .masthead-text {
    font-family: 'Amatic SC', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 200;
    letter-spacing: 0.15em;
    color: #e8e0d4;
    text-transform: uppercase;
    text-align: center;
  }

  /* ── Flower ── */
  .flower-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 0;
    padding: 8px 0;
  }

  .flower-img {
    max-height: 65vh;
    max-width: min(676px, 90vw);
    width: auto;
    height: auto;
    display: block;
    animation: fadeIn 2.5s ease-out 0.4s both;
  }

  /* ── Enter button ── */
  .enter-wrap {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    padding: 0 0 4vh;
    animation: fadeIn 3.2s ease-out 1s both;
  }

  .enter-btn {
    display: inline-block;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 300;
    font-size: clamp(11px, 1.2vw, 15px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: #e8e0d4;
    text-decoration: none;
    border: 1px solid rgba(232, 224, 212, 0.35);
    padding: 12px 36px;
    transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease;
  }

  .enter-btn:hover {
    color: #000;
    background: #e8e0d4;
    border-color: #e8e0d4;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

@media (max-width: 600px) {
  .masthead-wrap { padding: 16px 0 10px; }
  .flower-img { max-height: 50dvh; }
  .enter-wrap { padding-bottom: 6dvh; }
}
</style>
</head>
<body>

  <div class="masthead-wrap" id="mastheadWrap">
    <div class="masthead-text">Twins Are Birds</div>
  </div>

  <div class="flower-wrap">
    <img class="flower-img" src="IMG_8360.GIF" alt="">
  </div>

  <div class="enter-wrap">
    <a class="enter-btn" href="menu.html">Enter</a>
  </div>

</body>
</html>

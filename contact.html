<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Twins Are Birds</title>
<meta name="description" content="Get in touch with Jim Mott about Twins Are Birds.">

<meta property="og:type" content="website">
<meta property="og:url" content="https://jimmott-collab.github.io/twins-are-birds/contact.html">
<meta property="og:title" content="Contact — Twins Are Birds">
<meta property="og:description" content="Get in touch with Jim Mott about Twins Are Birds.">
<meta property="og:image" content="https://jimmott-collab.github.io/twins-are-birds/og-image.jpg">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Contact — Twins Are Birds">
<meta name="twitter:description" content="Get in touch with Jim Mott about Twins Are Birds.">
<meta name="twitter:image" content="https://jimmott-collab.github.io/twins-are-birds/og-image.jpg">

<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400;600&family=Amatic+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
  }

  body {
    color: #e8e0d4;
    font-family: 'Josefin Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Hamburger ── */
  .hamburger-btn {
    position: fixed;
    top: 18px;
    right: 20px;
    z-index: 1000;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    -webkit-tap-highlight-color: transparent;
  }
  .hamburger-btn span {
    display: block;
    width: 22px;
    height: 1px;
    background: rgba(232,224,212,0.45);
    transition: all 0.3s ease;
    transform-origin: center;
  }
  .hamburger-btn:hover span { background: rgba(232,224,212,0.75); }
  .hamburger-btn.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
  .hamburger-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger-btn.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

  .nav-overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,10,10,0.0);
    z-index: 998;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .nav-overlay.open { opacity: 1; pointer-events: all; }

  .nav-drawer {
    position: fixed;
    top: 0; right: 0;
    width: 220px; height: 100%;
    background: #0a0a0a;
    border-left: 1px solid rgba(255,255,255,0.07);
    z-index: 999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 36px;
    transform: translateX(100%);
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  .nav-drawer.open { transform: translateX(0); }
  .nav-drawer a {
    display: block;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: color 0.2s ease;
  }
  .nav-drawer a:first-child { border-top: 1px solid rgba(255,255,255,0.06); }
  .nav-drawer a:hover { color: rgba(255,255,255,0.8); }
  .nav-drawer .nav-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* ── Masthead ── */
  .masthead-wrap {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    padding: 40px 0 20px;
  }

  .masthead-text {
    font-family: 'Amatic SC', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 400;
    letter-spacing: 0.15em;
    color: #e8e0d4;
    text-transform: uppercase;
    text-align: center;
  }

  /* ── Video ── */
  .video-wrap {
    width: 100%;
    max-width: 200px;
    margin: 10px auto 20px;
    display: flex;
    justify-content: center;
  }

  .video-wrap video {
    width: 100%;
    height: auto;
    display: block;
    mix-blend-mode: lighten;
  }

  /* ── Content ── */
  .content {
    width: 100%;
    max-width: 620px;
    padding: 0 32px 80px;
    animation: fadeIn 2.5s ease-out 0.4s both;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: rgba(232, 224, 212, 0.3);
    margin: 0 auto 48px;
  }

  .body-text p {
    font-weight: 300;
    font-size: clamp(13px, 1.4vw, 15px);
    letter-spacing: 0.06em;
    line-height: 1.9;
    color: #e8e0d4;
    margin-bottom: 1.4em;
  }

  .body-text p:last-child { margin-bottom: 0; }

  .body-text a {
    color: #e8e0d4;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(232, 224, 212, 0.35);
    transition: text-decoration-color 0.2s;
  }

  .body-text a:hover {
    text-decoration-color: #e8e0d4;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (max-width: 600px) {
    .masthead-wrap { padding: 16px 0 10px; }
    .content { padding: 0 20px 48px; }
    .video-wrap { max-width: 160px; }
  }
</style>
</head>
<body>

<!-- HAMBURGER MENU -->
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">
  <span></span>
  <span></span>
  <span></span>
</button>
<div class="nav-overlay" id="navOverlay"></div>
<nav class="nav-drawer" id="navDrawer">
  <p class="nav-label">Twins Are Birds</p>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
  <a href="about.html">About</a>
  <a href="contact.html">Contact</a>
</nav>

<!-- HEADING -->
<div class="masthead-wrap">
  <div class="masthead-text">Contact</div>
</div>

<!-- VIDEO -->
<div class="video-wrap">
  <video autoplay loop muted playsinline poster="poster_square.jpg">
    <source src="head_square.mp4" type="video/mp4">
  </video>
</div>

<!-- COPY -->
<div class="content">
  <div class="divider"></div>
  <div class="body-text">
    <p>My name is Jim Mott. I'm a freelance commercial anthropologist.</p>
    <p>You can read more of my thinking about culture and ethnographic practice <a href="https://luckybaboon.substack.com/" target="_blank" rel="noopener">here</a>.</p>
    <p>You can contact me <a href="#" id="mailto-link">here</a>.</p>
  </div>
</div>

<script>
(function() {
  var u = ['j','i','m','.','m','o','t','t','.','i','s','.','h','e','r','e','@','g','m','a','i','l','.','c','o','m'];
  document.getElementById('mailto-link').href = 'mailto:' + u.join('');
})();

const hamburgerBtn = document.getElementById('hamburgerBtn');
const navDrawer    = document.getElementById('navDrawer');
const navOverlay   = document.getElementById('navOverlay');

function openMenu() {
  hamburgerBtn.classList.add('open');
  navDrawer.classList.add('open');
  navOverlay.classList.add('open');
}
function closeMenu() {
  hamburgerBtn.classList.remove('open');
  navDrawer.classList.remove('open');
  navOverlay.classList.remove('open');
}

hamburgerBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  navDrawer.classList.contains('open') ? closeMenu() : openMenu();
});
navOverlay.addEventListener('click', closeMenu);
navDrawer.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', closeMenu);
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeMenu();
});
</script>

</body>
</html>

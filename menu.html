  for (var c = 0; c < copies; c++) {
    for (var i = 0; i < ISSUES.length; i++) {
      var issue = ISSUES[i];
      var div = document.createElement("div");
      div.className = "carousel-item";
      var link = document.createElement("a");

      var img = document.createElement("img");

      var label = document.createElement("div");

  var currentIndex = Math.floor(copies / 2) * ISSUES.length;
  var isAnimating = false;

  function getItemWidth() {
    var vp = document.getElementById("carouselTrack").parentElement;
    return vp.offsetWidth;
  }

  function jumpTo(idx, animate) {
    var offset = idx * getItemWidth();
    track.style.transition = animate ? "transform 0.4s ease" : "none";
    track.style.transform = "translateX(" + (-offset) + "px)";
  }

  function wrapIndex() {
    var setLen = ISSUES.length;
    if (currentIndex < setLen) {
      currentIndex += setLen;
      jumpTo(currentIndex, false);
    } else if (currentIndex >= (copies - 1) * setLen) {
      currentIndex -= setLen;
      jumpTo(currentIndex, false);
    }
  }

  function stepNext() {
    if (isAnimating) return;
    isAnimating = true;
    currentIndex++;
    jumpTo(currentIndex, true);
    setTimeout(function() { wrapIndex(); isAnimating = false; }, 450);
  }

  function stepPrev() {
    if (isAnimating) return;
    isAnimating = true;
    currentIndex--;
    jumpTo(currentIndex, true);
    setTimeout(function() { wrapIndex(); isAnimating = false; }, 450);
  }

  window.addEventListener('resize', function() { jumpTo(currentIndex, false); });
  document.getElementById("carouselPrev").addEventListener("click", stepPrev);

<script>
(function() {
  document.querySelectorAll('.carousel-item a').forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      var href = this.href;
      var item = this.closest('.carousel-item');
      var rect = item.getBoundingClientRect();

      // Store origin rect for the issue page arrive animation
      sessionStorage.setItem('tab_origin', JSON.stringify({
        x: rect.left,
        y: rect.top,
        w: rect.width,
        h: rect.height,
        vw: window.innerWidth,
        vh: window.innerHeight
      }));

      // Create overlay that expands from the item rect to fullscreen
      var overlay = document.createElement('div');
      overlay.style.cssText = [
        'position:fixed',
        'left:' + rect.left + 'px',
        'top:' + rect.top + 'px',
        'width:' + rect.width + 'px',
        'height:' + rect.height + 'px',
        'background:#0a0a0a',
        'z-index:9999',
        'transition:all 0.5s cubic-bezier(0.7,0,0.3,1)',
        'pointer-events:none'
      ].join(';');
      document.body.appendChild(overlay);

      // Trigger expansion on next frame
      requestAnimationFrame(function() {
        requestAnimationFrame(function() {
          overlay.style.left = '0';
          overlay.style.top = '0';
          overlay.style.width = '100vw';
          overlay.style.height = '100vh';
        });
      });

      setTimeout(function() {
        window.location.href = href;
      }, 520);
    });
  });
})();

  hamburgerBtn.classList.remove('open');
  navDrawer.classList.remove('open');
  navOverlay.classList.remove('open');
}

hamburgerBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  navDrawer.classList.contains('open') ? closeMenu() : openMenu();
});

navOverlay.addEventListener('click', closeMenu);

navDrawer.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', closeMenu);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeMenu();
});

</script>
</body>
</html>

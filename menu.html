<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twins Are Birds — Index</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400;600&family=Amatic+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

/* dvh fix */
html, body {
  height: 100vh;
  height: 100dvh;
  background: #000;
  overflow: hidden;
}

body {
  color: #e8e0d4;
  font-family: 'Josefin Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
}

/* ── Masthead ── */
.masthead-wrap {
  padding: 40px 0 20px;
  text-align: center;
  flex-shrink: 0;
}

.masthead-text {
  font-family: 'Amatic SC', sans-serif;
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 200;
  letter-spacing: 0.15em;
  color: #e8e0d4;
  text-transform: uppercase;
}

/* ── Carousel ── */

.carousel-track {
  display: flex;
  width: 100%;
}

.carousel-item {
  flex: 0 0 100%;
  width: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #000;
}

/* UPDATED */
.carousel-item a {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-decoration: none;
  color: #e8e0d4;
  width: min(80vw, 620px);
  max-width: 90vw;
  transition: opacity 0.3s ease;
  opacity: 0.85;
}

.carousel-item a:hover { opacity: 1; }

/* UPDATED */
.carousel-item img {
  width: 100%;
  max-width: 620px;
  height: auto;
  max-height: 60vh;
  object-fit: contain;
  display: block;

  box-shadow: 
    inset 0 0 0 10px rgba(0, 0, 0, 1),
    inset 0 0 0 11px rgba(232, 224, 212, 0.12),
    0 8px 30px rgba(0, 0, 0, 0.6),
    0 0 20px rgba(232, 224, 212, 0.06);
}

.carousel-label {
  padding: 10px 0 4px;
  text-align: center;
}

.carousel-number {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.2em;
  color: rgba(232,224,212,0.25);
  display: block;
  margin-bottom: 3px;
}

.carousel-title {
  font-size: clamp(12px, 1.4vw, 14px);
  font-weight: 300;
  letter-spacing: 0.06em;
}

.carousel-thinker {
  font-size: 10px;
  font-weight: 300;
  letter-spacing: 0.15em;
  color: rgba(232,224,212,0.25);
  text-transform: uppercase;
  margin-top: 2px;
}

/* ── Nav arrows ── */

.carousel-section {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* UPDATED */
.carousel-wrapper {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 860px;
  padding: 0 12px;
  box-sizing: border-box;
}

.carousel-viewport {
  overflow: visible;
  flex: 1;
  display: flex;
  min-height: 0;
  align-items: center; /* ← add this */
}

.carousel-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.4);
  width: 44px;
  height: 80px;
  font-family: 'Josefin Sans', sans-serif;
  font-size: 18px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  margin: 0 12px;
}

.carousel-btn:hover {
  border-color: rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.7);
}

/* UPDATED MOBILE */
@media (max-width: 600px) {
  .masthead-wrap { padding: 16px 0 10px; }
  .carousel-wrapper { max-width: 100%; padding: 0 4px; }

  .carousel-item a { width: 88%; }
  .carousel-item img { max-height: 70vh; }

  .carousel-btn { width: 32px; height: 60px; margin: 0 4px; font-size: 14px; }
}
</style>
</head>
<body>

<div class="masthead-wrap" id="mastheadWrap">
  <div class="masthead-text">Twins Are Birds</div>
</div>

<div class="carousel-section">
  <div class="carousel-wrapper">
    <button class="carousel-btn" id="carouselPrev">&#8592;</button>
    <div class="carousel-viewport">
      <div class="carousel-track" id="carouselTrack"></div>
    </div>
    <button class="carousel-btn" id="carouselNext">&#8594;</button>
  </div>
</div>

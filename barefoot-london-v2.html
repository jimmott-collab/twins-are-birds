<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barefoot London</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #e8e0d4;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'EB Garamond', serif;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
  }

  .scene {
    width: 100vw;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    position: relative;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 6vw, 80px);
    letter-spacing: 0.25em;
    color: #e8e0d4;
    text-align: center;
    margin-bottom: 60px;
    opacity: 0;
    animation: fadeUp 1.5s ease-out 0.3s forwards;
  }

  .title .london {
    color: #c4a67a;
    margin-left: 0.2em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .layout {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    max-width: 1100px;
    width: 100%;
    position: relative;
  }

  .col-left, .col-right {
    flex: 1;
    font-size: clamp(15px, 1.8vw, 20px);
    line-height: 1.9;
    color: #c8bfb0;
    opacity: 0;
  }

  .col-left {
    text-align: right;
    padding-right: 40px;
    animation: fadeUp 1.5s ease-out 2.5s forwards;
  }

  .col-right {
    text-align: left;
    padding-left: 40px;
    animation: fadeUp 1.5s ease-out 3.2s forwards;
  }

  .foot-center {
    flex: 0 0 auto;
    width: clamp(140px, 22vw, 260px);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .foot-center svg {
    width: 100%;
    height: auto;
    opacity: 0;
    animation: fadeUp 2s ease-out 1s forwards;
    filter: drop-shadow(0 0 60px rgba(196, 166, 122, 0.1));
  }

  .foot-fill {
    fill: #c4a67a;
    opacity: 0.06;
    animation: fillPulse 6s ease-in-out infinite;
  }

  @keyframes fillPulse {
    0%, 100% { opacity: 0.06; }
    50% { opacity: 0.1; }
  }

  .foot-stroke {
    fill: none;
    stroke: #c4a67a;
    stroke-width: 1.2;
    opacity: 0.5;
    stroke-dasharray: 2000;
    stroke-dashoffset: 2000;
    animation: drawLine 3.5s ease-in-out 1.2s forwards;
  }

  @keyframes drawLine {
    to { stroke-dashoffset: 0; }
  }

  .sensory {
    color: #d4a574;
    font-style: italic;
  }

  .word {
    display: inline;
    opacity: 0;
    animation: wordIn 0.5s ease-out forwards;
  }

  @keyframes wordIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .ghost {
    position: fixed;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.4em;
    opacity: 0.03;
    color: #c4a67a;
    pointer-events: none;
    white-space: nowrap;
  }

  .g1 { font-size: clamp(50px, 12vw, 160px); top: 15%; left: -3%; transform: rotate(-90deg); }
  .g2 { font-size: clamp(40px, 8vw, 100px); bottom: 8%; right: 2%; transform: rotate(5deg); }

  .colophon {
    position: fixed;
    bottom: 28px;
    right: 36px;
    font-style: italic;
    font-size: 12px;
    color: #5a5347;
    letter-spacing: 0.12em;
    z-index: 10;
    opacity: 0;
    animation: fadeUp 1.5s ease-out 4.5s forwards;
  }

  @media (max-width: 768px) {
    .scene { padding: 40px 20px; }
    .layout { flex-direction: column; align-items: center; }
    .col-left, .col-right {
      text-align: center;
      padding: 24px 10px;
      max-width: 500px;
    }
    .foot-center { width: 140px; margin: 20px 0; }
    .ghost { display: none; }
    .title { margin-bottom: 30px; letter-spacing: 0.15em; }
  }
</style>
</head>
<body>

<div class="ghost g1">BERMONDSEY</div>
<div class="ghost g2">PAVEMENT</div>

<div class="scene">
  <h1 class="title">BAREFOOT <span class="london">LONDON</span></h1>

  <div class="layout">
    <div class="col-left" id="col-left"></div>

    <div class="foot-center">
      <svg viewBox="0 0 220 580" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <path id="footpath" d="
            M108,30
            C96,22 84,18 78,24
            C72,30 74,42 76,52
            C78,62 80,72 78,84
            C76,96 72,108 68,122
            C64,136 60,150 58,166
            C56,182 56,198 58,216
            C60,234 64,252 66,272
            C68,292 68,312 66,332
            C64,352 58,370 54,388
            C50,406 48,422 50,438
            C52,454 58,468 66,478
            C74,488 84,494 96,498
            C108,502 120,502 132,498
            C144,494 154,486 160,474
            C166,462 168,448 166,432
            C164,416 160,400 158,384
            C156,368 156,350 158,332
            C160,314 164,296 166,278
            C168,260 168,242 166,224
            C164,206 160,190 158,174
            C156,158 158,142 162,128
            C166,114 172,100 174,86
            C176,72 174,58 168,46
            C162,34 152,26 142,22
            C132,14 120,18 114,24
            Z
          "/>
        </defs>
        <use href="#footpath" class="foot-fill"/>
        <use href="#footpath" class="foot-stroke"/>
        <!-- Toes -->
        <ellipse cx="108" cy="18" rx="10" ry="14" class="foot-fill" transform="rotate(-5,108,18)"/>
        <ellipse cx="108" cy="18" rx="10" ry="14" class="foot-stroke" transform="rotate(-5,108,18)"/>
        <ellipse cx="88" cy="16" rx="8" ry="12" class="foot-fill" transform="rotate(-15,88,16)"/>
        <ellipse cx="88" cy="16" rx="8" ry="12" class="foot-stroke" transform="rotate(-15,88,16)"/>
        <ellipse cx="128" cy="16" rx="9" ry="13" class="foot-fill" transform="rotate(8,128,16)"/>
        <ellipse cx="128" cy="16" rx="9" ry="13" class="foot-stroke" transform="rotate(8,128,16)"/>
        <ellipse cx="144" cy="24" rx="7" ry="11" class="foot-fill" transform="rotate(15,144,24)"/>
        <ellipse cx="144" cy="24" rx="7" ry="11" class="foot-stroke" transform="rotate(15,144,24)"/>
        <ellipse cx="156" cy="36" rx="6" ry="10" class="foot-fill" transform="rotate(22,156,36)"/>
        <ellipse cx="156" cy="36" rx="6" ry="10" class="foot-stroke" transform="rotate(22,156,36)"/>
      </svg>
    </div>

    <div class="col-right" id="col-right"></div>
  </div>
</div>

<div class="colophon">Shifting Dullness</div>

<script>
const fullText = `Years later I was back, standing on the escalator at Bermondsey with no shoes on — spending a week barefoot to try the city in a different way. I felt like I had plugged into a new sensory organ, like a pair of headphones playing the street to me. The flavour of asphalt and puddles, fag butts between the toes, slapping across pavements and padding over roads until I was booted out a pub, health and safety reasons for being a dickhead I think.`;

const sensoryWords = new Set([
  'barefoot', 'sensory', 'headphones', 'flavour', 'asphalt',
  'puddles', 'toes', 'slapping', 'padding', 'plugged', 'shoes',
  'street', 'pavements'
]);

const words = fullText.split(/\s+/);
const midpoint = Math.ceil(words.length / 2);
const leftWords = words.slice(0, midpoint);
const rightWords = words.slice(midpoint);

function renderWords(wordsArr, container, baseDelay) {
  wordsArr.forEach((word, i) => {
    const span = document.createElement('span');
    span.className = 'word';
    const clean = word.toLowerCase().replace(/[^a-z]/g, '');
    if (sensoryWords.has(clean)) {
      span.classList.add('sensory');
    }
    span.textContent = word + ' ';
    span.style.animationDelay = `${baseDelay + i * 0.07}s`;
    container.appendChild(span);
  });
}

renderWords(leftWords, document.getElementById('col-left'), 2.5);
renderWords(rightWords, document.getElementById('col-right'), 3.2);
</script>

</body>
</html>
